<?xml version="1.0" encoding="utf-8"?>
<!--
  MAR.IA — favicon.
  Quadrado arredondado em teal (cor primária do app) com escudo branco ao centro,
  ecoando o ícone Shield (lucide) usado no header. A letra "M" interna mantém
  reconhecimento da marca em 16x16 px na aba do navegador.
-->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" xml:space="preserve">
  <!-- Fundo teal-700 (#0f766e) — mesma cor do gradiente do header da MAR.IA -->
  <rect x="1" y="1" width="28" height="28" rx="5" ry="5" fill="#0f766e"/>
  <!-- Escudo branco simplificado ao centro -->
  <path d="M15 6.5
           C 15 6.5, 12 8.2, 8.5 8.2
           L 8.5 14.5
           C 8.5 19.2, 11.5 21.8, 15 23.5
           C 18.5 21.8, 21.5 19.2, 21.5 14.5
           L 21.5 8.2
           C 18 8.2, 15 6.5, 15 6.5 Z"
        fill="#ffffff"/>
  <!-- Letra "M" interna em teal, marca discreta da MAR.IA -->
  <path d="M11.5 12.5
           L 11.5 18.5
           M 11.5 12.5
           L 15 16
           L 18.5 12.5
           M 18.5 12.5
           L 18.5 18.5"
        stroke="#0f766e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
